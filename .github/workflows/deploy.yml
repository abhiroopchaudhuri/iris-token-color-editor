name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts || npm install --ignore-scripts
          cd design-system
          npm install --legacy-peer-deps --ignore-scripts
          cd ..
          cd token-editor
          npm install --legacy-peer-deps --ignore-scripts
          cd ..

      - name: Build project
        env:
          NEXT_PUBLIC_BASE_PATH: /iris-token-color-editor
          NODE_OPTIONS: "--max_old_space_size=6144 --openssl-legacy-provider"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./token-editor/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
